name: Publish weekly Mac App Digest

on:
  schedule:
    # Friday at 8:00 AM Pacific during daylight saving time.
    - cron: "0 15 * * 5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-mac-app-digest
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out the site
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Research and write this week’s edition
        run: node scripts/generate-weekly-digest.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.6-terra

      - name: Commit the new edition
        run: |
          if git diff --quiet -- content/issues.json; then
            echo "No new issue to publish."
            exit 0
          fi
          git config user.name "Mac App Digest Bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/issues.json
          git commit -m "Publish weekly Mac App Digest"
          git push
