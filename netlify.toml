[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/archive.html"
  to = "/archive/"
  status = 301

[[redirects]]
  from = "/issues/:slug.html"
  to = "/issues/:slug/"
  status = 301

[[redirects]]
  from = "/tags/:tag.html"
  to = "/tags/:tag/"
  status = 301
